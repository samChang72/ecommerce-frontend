name = "order-relay"
main = "order-relay.js"
compatibility_date = "2026-07-24"

# 速率限制：每 IP 每 60 秒最多 5 筆請求（防止惡意灌單清空庫存）
[[unsafe.bindings]]
name = "ORDER_RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 5, period = 60 }

# GITHUB_TOKEN 為 Secret，不寫在此檔案
# 部署：npx wrangler deploy
# 設定 Secret：npx wrangler secret put GITHUB_TOKEN
