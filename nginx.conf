server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback for the /ecommerce-frontend/* base path
  location /ecommerce-frontend/ {
    try_files $uri $uri/ /ecommerce-frontend/index.html;
  }

  # Redirect bare root to the app base
  location = / {
    return 302 /ecommerce-frontend/;
  }

  # Cloud Run / LB health probe
  location = /healthz {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }
}
