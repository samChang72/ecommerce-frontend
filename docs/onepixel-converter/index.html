<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OnePixel Converter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script type="importmap">
    {
      "imports": {
        "docx": "https://esm.sh/docx@9.5.0"
      }
    }
  </script>
</head>
<body>
  <main class="container">
    <h1 class="page-title">OnePixel Converter</h1>
    <p class="page-subtitle">將 OneAD 匯出的 HTML 轉換為客戶部署 Markdown 文件</p>

    <!-- Upload area -->
    <div id="drop-zone" class="drop-zone" role="button" tabindex="0" aria-label="上傳 HTML 檔案">
      <input type="file" id="file-input" accept=".html,.htm" hidden>
      <p class="drop-zone-text">拖拽 HTML 檔案到這裡，或點擊選擇檔案</p>
    </div>

    <!-- Status -->
    <div id="status" class="status" role="status" aria-live="polite" hidden></div>

    <!-- Summary -->
    <div id="summary" class="summary" role="status" aria-live="polite" hidden></div>

    <!-- Client name input -->
    <div id="name-section" class="name-section" hidden>
      <label for="client-name" class="input-label">客戶名稱</label>
      <input type="text" id="client-name" class="input-field" placeholder="輸入客戶名稱">
    </div>

    <!-- Preview -->
    <div id="preview-section" class="preview-section" hidden>
      <div class="preview-header">
        <h2 class="section-title">Markdown 預覽</h2>
        <button id="copy-btn" class="btn btn-secondary" type="button">複製</button>
      </div>
      <pre id="preview" class="preview"></pre>
    </div>

    <!-- Download -->
    <div class="download-group">
      <button id="download-btn" class="btn btn-primary" type="button" disabled>下載 .md 檔案</button>
      <button id="download-html-btn" class="btn btn-outline" type="button" disabled>下載 .html 檔案</button>
      <button id="download-docx-btn" class="btn btn-outline" type="button" disabled>下載 .docx 檔案</button>
    </div>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
